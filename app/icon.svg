<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon: the CPC wordmark mark, matching the brand logo.
       Paper #e9e3d5, ink #211e17, green #2f6043 (same tokens as globals.css).
       textLength + lengthAdjust keep "CPC" inside the box on any system font. -->
  <rect width="64" height="64" rx="12" fill="#e9e3d5"/>
  <text x="32" y="42"
        text-anchor="middle"
        textLength="46" lengthAdjust="spacingAndGlyphs"
        font-family="'Arial Narrow', 'Helvetica Neue Condensed', 'Roboto Condensed', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="34" letter-spacing="-1"
        fill="#211e17">CPC</text>
  <rect x="19" y="49" width="26" height="3" rx="1.5" fill="#2f6043"/>
</svg>
